<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080B14"/>
      <stop offset="100%" stop-color="#0D1220"/>
    </linearGradient>
    <linearGradient id="glowGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14F195" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#14F195" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glowPurple" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#9945FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#9945FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="topBorder" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080B14"/>
      <stop offset="40%" stop-color="#14F195"/>
      <stop offset="70%" stop-color="#9945FF"/>
      <stop offset="100%" stop-color="#080B14"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#14F195"/>
      <stop offset="100%" stop-color="#9945FF"/>
    </linearGradient>
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="80" result="blur"/>
    </filter>
    <filter id="purpleGlow">
      <feGaussianBlur stdDeviation="70" result="blur"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines -->
  <g opacity="0.04" stroke="#14F195" stroke-width="1">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
    <line x1="1140" y1="0" x2="1140" y2="630"/>
  </g>

  <!-- Glow top-right green -->
  <ellipse cx="1050" cy="80" rx="320" ry="280" fill="url(#glowGreen)" filter="url(#greenGlow)"/>

  <!-- Glow bottom-left purple -->
  <ellipse cx="150" cy="550" rx="280" ry="220" fill="url(#glowPurple)" filter="url(#purpleGlow)"/>

  <!-- Top border accent -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#topBorder)"/>

  <!-- Logo box -->
  <rect x="72" y="56" width="48" height="48" rx="10" fill="url(#logoGrad)"/>
  <text x="96" y="88" font-size="28" text-anchor="middle" fill="#080B14">🧹</text>

  <!-- Brand name -->
  <text x="134" y="90" font-family="'Courier New', monospace" font-size="26" font-weight="800" fill="#FFFFFF" letter-spacing="2">ARSWEEP</text>

  <!-- Live badge -->
  <rect x="1010" y="56" width="118" height="34" rx="17" fill="#14F19515" stroke="#14F19550" stroke-width="1"/>
  <circle cx="1028" cy="73" r="5" fill="#14F195"/>
  <text x="1040" y="78" font-family="'Courier New', monospace" font-size="12" font-weight="600" fill="#14F195" letter-spacing="1">LIVE ON SOL</text>

  <!-- Main headline -->
  <text x="72" y="290" font-family="'Courier New', monospace" font-size="72" font-weight="900" fill="#FFFFFF" letter-spacing="-2">Sweep Your</text>
  <text x="72" y="375" font-family="'Courier New', monospace" font-size="72" font-weight="900" letter-spacing="-2">
    <tspan fill="#14F195">Solana</tspan>
    <tspan fill="#FFFFFF"> Dust</tspan>
  </text>

  <!-- Subtitle -->
  <text x="72" y="430" font-family="'Courier New', monospace" font-size="22" fill="#FFFFFF" opacity="0.5">Reclaim rent SOL from empty token accounts — fast &amp; non-custodial</text>

  <!-- Bottom stats -->
  <!-- Stat 1 -->
  <text x="72" y="530" font-family="'Courier New', monospace" font-size="11" fill="#FFFFFF" opacity="0.35" letter-spacing="2">NETWORK</text>
  <text x="72" y="558" font-family="'Courier New', monospace" font-size="20" font-weight="700" fill="#14F195">Solana</text>

  <!-- Stat 2 -->
  <text x="280" y="530" font-family="'Courier New', monospace" font-size="11" fill="#FFFFFF" opacity="0.35" letter-spacing="2">CUSTODY</text>
  <text x="280" y="558" font-family="'Courier New', monospace" font-size="20" font-weight="700" fill="#14F195">Non-custodial</text>

  <!-- Stat 3 -->
  <text x="560" y="530" font-family="'Courier New', monospace" font-size="11" fill="#FFFFFF" opacity="0.35" letter-spacing="2">FEE</text>
  <text x="560" y="558" font-family="'Courier New', monospace" font-size="20" font-weight="700" fill="#14F195">Ultra low</text>

  <!-- Bottom border -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#topBorder)" opacity="0.4"/>
</svg>
